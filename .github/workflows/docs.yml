name: Docs

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

jobs:
  docs-build:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v6
        with:
          python-version: "3.10"

      - name: Install package and docs dependencies
        run: pip install -e ".[all,docs]"

      - name: Ensure generated model catalog is up to date
        run: |
          python scripts/generate_model_catalog.py
          git diff --exit-code -- \
            .generated/model-catalog.json \
            .snippets/generated/ \
            mlx_audio/ui/public/model-catalog.json \
            docs/models/index.md \
            docs/models/tts/index.md \
            docs/models/stt/index.md \
            docs/models/sts/index.md \
            docs/models/vad/index.md \
            docs/models/tts/generated/ \
            docs/models/stt/generated/ \
            docs/models/sts/generated/ \
            docs/models/vad/generated/

      - name: Build docs
        run: mkdocs build --strict

  docs-required-for-user-facing-changes:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Ensure docs changed for user-facing changes
        run: |
          git fetch origin "${{ github.base_ref }}"

          USER_FACING_CHANGES="$(git diff --name-only "origin/${{ github.base_ref }}"...HEAD -- \
            'mlx_audio/tts/models/**' \
            'mlx_audio/stt/models/**' \
            'mlx_audio/sts/models/**' \
            'mlx_audio/vad/models/**' \
            'mlx_audio/tts/utils.py' \
            'mlx_audio/stt/utils.py' \
            'mlx_audio/sts/voice_pipeline.py' \
            'mlx_audio/tts/generate.py' \
            'mlx_audio/stt/generate.py' \
            'mlx_audio/sts/generate.py' \
            'mlx_audio/server.py')"
          if [ -z "$USER_FACING_CHANGES" ]; then
            exit 0
          fi

          DOC_CHANGES="$(git diff --name-only "origin/${{ github.base_ref }}"...HEAD -- 'docs/**' 'mkdocs.yml' 'README.md')"
          if [ -n "$DOC_CHANGES" ]; then
            exit 0
          fi

          echo "User-facing code changed but no docs files were updated."
          echo "$USER_FACING_CHANGES"
          echo
          echo "Update docs/, mkdocs.yml, or README.md when changing public models, APIs, CLI flows, or the server."
          exit 1
